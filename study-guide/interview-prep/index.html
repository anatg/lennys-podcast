<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PM Interview Flashcards</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b8def;
      --accent-dim: #3d5a8a;
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 50% -10%, #1e2a44 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem 1rem 5rem;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 650;
      margin: 0;
      flex: 1 1 100%;
    }
    label { font-size: 0.8rem; color: var(--muted); }
    select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid #2a3a52;
      border-radius: 10px;
      padding: 0.45rem 0.65rem;
      font-size: 0.9rem;
      min-width: 220px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: flex-end;
    }
    button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid #2a3a52;
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      font-size: 0.88rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent-dim); }
    button.primary {
      background: linear-gradient(160deg, #4a7ae8, #355bb5);
      border-color: #4a6ec4;
      font-weight: 600;
    }
    button.primary:hover { filter: brightness(1.06); }
    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0.35rem 0 0.75rem;
      width: 100%;
    }
    .scene {
      perspective: 1200px;
      margin-top: 0.5rem;
    }
    .card {
      position: relative;
      min-height: 300px;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      padding: 1.15rem 1.25rem;
      border: 1px solid #2a3a52;
      background: linear-gradient(165deg, #1c2738 0%, #151d2b 100%);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      overflow: auto;
    }
    .face.back {
      transform: rotateY(180deg);
    }
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 0.65rem;
    }
    .q {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0;
      line-height: 1.35;
    }
    .back h3 {
      margin: 0.85rem 0 0.35rem;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .back h3:first-child { margin-top: 0; }
    .back p {
      margin: 0 0 0.5rem;
      font-size: 0.92rem;
      color: #dce4ef;
    }
    .back p:last-child { margin-bottom: 0; }
    .say-this {
      background: rgba(91, 141, 239, 0.1);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.5rem;
    }
    .say-this p {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 500;
      color: #e7ecf3;
      line-height: 1.4;
      font-style: italic;
    }
    .hint {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    kbd {
      font: 0.75rem monospace;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      border: 1px solid #3a4a63;
      background: #151d2b;
    }
    footer.nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.65rem 1rem calc(0.65rem + env(safe-area-inset-bottom));
      background: rgba(15, 20, 25, 0.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid #243047;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.source {
      color: var(--accent);
      font-size: 0.8rem;
    }
  </style>

<body>
  <div class="wrap">
    <header>
      <h1>PM interview flashcards</h1>
      <div class="toolbar">
        <div>
          <label for="cat">Category</label><br />
          <select id="cat" aria-label="Category"></select>
        </div>
        <button type="button" id="shuffle" title="Shuffle current filter">Shuffle</button>
        <button type="button" id="all" class="primary" title="All categories">All cards</button>
      </div>
      <p class="meta" id="progress"></p>
      <a class="source" href="./flashcards.md">Edit source: flashcards.md</a>
    </header>
    <div class="scene">
      <div class="card" id="flipCard" role="button" tabindex="0" aria-label="Flip card. Space to flip.">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div>
    </div>
    <p class="hint">Click card or <kbd>Space</kbd> to flip · <kbd>←</kbd> <kbd>→</kbd> prev/next</p>
