  <footer class="nav">
    <button type="button" id="prev">← Prev</button>
    <button type="button" id="flipBtn" class="primary">Flip</button>
    <button type="button" id="next">Next →</button>
  </footer>
  <script>
    const CARDS = [{"category": "Prioritization & roadmap", "title": "\"How do you prioritize?\"", "q": "We have more ideas than capacity. How do you decide what ships first?", "answer": "I start by checking whether we're solving for the right problem — most prioritization debates are actually strategy debates in disguise. Once I'm clear on the crux (the single hardest barrier to the outcome we need), I evaluate ideas by how directly they remove that barrier. I use explicit non-goals to make trade-offs visible, and I treat roadmap items as bets with named assumptions, not commitments to features. If the team is arguing about Jira tickets, the real problem is usually that the strategy isn't clear enough — I fix that first.", "insight": "Prioritization is downstream of strategy. A clear strategy makes 80% of prioritization decisions obvious.", "story": "When I inherited a backlog of 200+ items, I didn't score them — I wrote a one-page strategy doc that named the one outcome the company needed most. Immediately 150 items were obviously wrong, and we had a real debate about 20."}, {"category": "Prioritization & roadmap", "title": "\"Say no to a CEO\"", "q": "The CEO wants a feature that doesn't align with strategy. What do you do?", "answer": "I never say no to the feature directly — I say \"let's align on what success would need to look like.\" Usually the CEO has a real customer or revenue concern that deserves to be addressed, just maybe not in the way they're proposing. I translate the request into a testable hypothesis, propose the cheapest experiment that validates or invalidates it, and make the opportunity cost explicit: \"if we build this, here's what we don't build.\" If I still disagree after all that, I write down my reasoning, commit to the decision, and set a review checkpoint.", "insight": "Reframe from \"should we build this?\" to \"what would success need to be true?\" — then propose the cheapest test.", "story": "A CEO pushed a feature one enterprise customer requested. I proposed a 2-week discovery spike instead of building it. We learned the customer actually needed a workflow change, not the feature — and built something 10× cheaper that still closed the deal."}, {"category": "Prioritization & roadmap", "title": "\"Roadmap for the next quarter\"", "q": "Walk me through how you'd build a quarterly roadmap.", "answer": "I start from strategy, not the backlog — one clear outcome the quarter needs to move, and 2–3 input metrics I can actually influence. Then I name what we're explicitly not doing, which matters as much as what we're doing because it prevents scope creep. I sequence work by asking \"what's the smallest thing that lets us validate the next bet?\" and I hold 20% of capacity for unknowns, because any roadmap assuming 100% efficiency is lying. The final artifact is less about dates and more about communicating sequencing logic and trade-offs.", "insight": "A roadmap is a communication tool for bets, not a calendar of features.", "story": "When I switched from Gantt-style roadmaps to a Now/Next/Later format with explicit strategy rationale, our quarterly planning meeting shrank from two days to four hours — because strategy was clear enough that sequencing decisions became obvious."}, {"category": "Prioritization & roadmap", "title": "\"Technical debt vs features\"", "q": "Eng wants a quarter of debt paydown; sales wants features.", "answer": "This is a false choice, and I reframe it immediately. Debt isn't a code quality problem — it's a delivery velocity and reliability risk with a business cost. I quantify it: how many engineering hours per sprint are we losing to workarounds? What's our incident rate and customer impact? What features can't we build because of the architecture? Once debt has a dollar or velocity cost, it competes on equal terms with feature work at the leadership level. My default is a sustained 20–30% debt ratio each sprint rather than one big paydown quarter that gets sacrificed the moment a sales deadline appears.", "insight": "Translate debt into forecastable velocity and reliability cost, then it competes fairly with features.", "story": "I used incident data to show the team was losing 35% of sprint capacity to production fires from a legacy module. That number — not the engineers' frustration — convinced leadership to prioritize the refactor. We cut incidents by 60% and shipped faster the following quarter."}, {"category": "Prioritization & roadmap", "title": "\"Competing stakeholders\"", "q": "Sales, legal, and design disagree on a launch.", "answer": "My job is to make trade-offs explicit and force a decision — not to please everyone or absorb the conflict myself. I map each stakeholder's constraint to a risk category: value risk (will customers use it?), feasibility (can we build it?), usability (can they use it?), viability (legal, financial, reputational). Then I find the launch configuration that clears the highest-risk bar. If legal is blocking, I scope to pass — not debate. If design is concerned, I run a quick usability check. The escalation doc I write names the risk accepted by each option, with the appropriate person signing off.", "insight": "PM owns making trade-offs visible with data; each function owns their risk domain.", "story": "Sales wanted broad access at launch, legal wanted a limited rollout. I proposed a 200-customer beta with explicit legal sign-off and a 4-week success gate. Both sides got a version of what they needed, and we shipped on time without a legal incident."}, {"category": "Prioritization & roadmap", "title": "\"Kill a project\"", "q": "When do you stop investing in a live initiative?", "answer": "The discipline is to set kill criteria at the start, not at the point of exhaustion. I ask before launching: what should we see by date X if this bet is working? If we can't answer that, we can't make a rational stop decision later. When evaluating a live initiative, I separate two questions: is the core hypothesis disproven, or is execution just hard? Hard execution is a reason to double down or change approach. A disproven hypothesis — customers don't have the problem we assumed, or won't pay what we assumed — is a reason to stop. The most common mistake is continuing because of sunk cost while knowing the hypothesis is wrong.", "insight": "Kill criteria should be set at launch, not when you're tired. Separate \"hard execution\" from \"disproven thesis.\"", "story": "A feature had been \"in progress\" for two quarters. When I wrote out the original hypothesis and checked it against what we'd learned, it was clearly disproven three months earlier. We cut it in a week, freed 40% of team capacity, and shipped the thing we'd been delaying."}, {"category": "Product sense / design (\"Design X for Y\")", "title": "\"Design a grocery app for seniors\"", "q": "Design an app for seniors buying groceries.", "answer": "I'd start by choosing a specific customer: a 72-year-old who used to grocery shop independently but now finds it stressful — not because of tech literacy but because of vision, fatigue, and unpredictability like substitutions and out-of-stocks. The job-to-be-done is \"get my regular staples reliably without having to think too hard.\" Day one I'd build: a standing-order list (same items every week), large tap targets with high contrast, and a human fallback phone number on every screen. I'd validate with task completion rate on real hardware in the user's home, not preference surveys in a lab — because what seniors say they want and what they can actually do are often different.", "insight": "Anchor on the job (reliable weekly staples), then design for fear — cognitive load, trust, support — not efficiency.", "story": "In a usability study for a 65+ audience, our \"simplified\" 4-step onboarding had a 70% drop-off. The problem wasn't the number of steps — it was requiring an email address they couldn't remember. Phone-number-only signup dropped abandonment to 20%."}, {"category": "Product sense / design (\"Design X for Y\")", "title": "\"What is good product sense?\"", "q": "How do you define product sense?", "answer": "Product sense is the ability to predict second-order effects — to look at a product decision and see not just the intended outcome but what it does to adjacent behaviors, metrics, and user expectations. It's built by obsessively studying why users do what they do (not just what), by studying products you don't work on and asking why they're designed that way, and by following the chain of \"and then what?\" every time you consider a change. Good product sense shows up when you catch the metric that will be gamed, the segment that will be confused, the feature that will increase activation but kill retention. It's compressed causality — knowing which levers actually move which outcomes for this specific user and business model.", "insight": "Product sense = predicting second-order effects, not knowing frameworks. \"And then what?\" is the core move.", "story": "Before we shipped a power-user feature, I flagged it would appear in the default onboarding flow and hurt new-user activation. The team pushed back. We ran an A/B test — activation dropped 12% in the variant. The feature shipped behind a settings toggle instead."}, {"category": "Product sense / design (\"Design X for Y\")", "title": "\"Improve onboarding\"", "q": "Activation is weak. Where do you start?", "answer": "I'd start by defining what \"activated\" means — not \"signed up\" but \"experienced the core value.\" Then I'd find the exact moment where users first get that value and cut everything between sign-up and that moment that doesn't directly contribute to reaching it. Session replay and cohort funnel analysis show me where people drop; qualitative interviews tell me why. Usually the problem isn't the number of steps — it's a trust gap (\"does this do what I think?\"), a setup cost (\"I have to import data before I see anything useful\"), or an expectation mismatch set in marketing. I prioritize reducing setup cost and accelerating time-to-value over UI polish.", "insight": "Map time-to-value, then cut everything that doesn't predict retained users.", "story": "We had 60% of users signing up and never returning. Funnels showed they dropped at \"connect your data.\" Interviews revealed they didn't trust us with their data yet. We added a demo mode with sample data — activation jumped 35% without changing the core product."}, {"category": "Product sense / design (\"Design X for Y\")", "title": "\"Delight vs complexity\"", "q": "Users ask for power features; the product is already complex.", "answer": "Delight that isn't hard to copy or margin-positive becomes tech debt — it's not a strategic asset. Before adding a power feature, I ask: does it delight a user who'll stay, pay more, and refer others? Is it hard enough to copy that we're building a lasting advantage? And what's the complexity tax — support tickets, onboarding friction, maintenance burden? My approach is progressive disclosure: sensible defaults for new users, unlockable depth for advanced users, with a clear architectural separation so the two don't collide. I track support tickets per feature as a proxy for complexity cost.", "insight": "Test every feature: Delight + Hard-to-copy + Margin-enhancing. Fail any one, reconsider.", "story": "Users begged for a custom reporting builder. We almost built it. Then I checked support tickets — our existing three report types generated 40% of all tickets. We simplified those three first, support dropped 30%, and we had the confidence to build the custom builder without destroying new-user experience."}, {"category": "Product sense / design (\"Design X for Y\")", "title": "\"Accessibility / inclusion\"", "q": "How do you prioritize accessibility?", "answer": "I treat accessibility as a quality and viability requirement with measurable outcomes — not a backlog item or virtue signal. The legal risk is real (WCAG compliance is a litigation target). The growth opportunity is real (roughly 15% of users have a disability, and designing for edge accessibility almost always improves usability for everyone). I set WCAG AA as a release gate for new surfaces, dogfood with assistive tech quarterly, and track task success rate across accessibility cohorts the same way I track other segments. When it competes for roadmap space, the frame is: \"this is the quality bar for shipping, not an optional add-on.\"", "insight": "Accessibility = quality + viability risk with measurable task-success metrics. Not a nice-to-have.", "story": "Adding keyboard navigation to our dashboard — an accessibility fix — increased power-user efficiency by 20% and became an enterprise sales differentiator for customers with accessibility procurement requirements. A compliance obligation became a feature highlight."}, {"category": "Product sense / design (\"Design X for Y\")", "title": "\"Innovation vs iteration\"", "q": "Should we bet big or iterate small?", "answer": "The right answer depends entirely on where you are in the strategy. If you've correctly diagnosed the crux — the single hardest barrier to the outcome you need — and removing that crux requires a step-change, then bet big. If you haven't validated the crux yet, small bets are almost always right because they preserve optionality and build evidence. The mistake is using \"we're being bold\" as cover for skipping diagnosis, or using \"we're being lean\" as cover for avoiding the hard bet. I also distinguish reversibility: small, reversible bets can go fast; big, irreversible architectural bets deserve upfront work.", "insight": "Size the bet to the strategy moment, not your risk appetite. Diagnose the crux first.", "story": "We debated rebuilding our data pipeline (6 months) vs patching it (2 months). I reframed it: what's the cost of this architecture constraint on features we're trying to ship? When we measured it — 4 weeks of overhead per feature — the rebuild ROI was positive within 6 months. The bet size was right once we quantified the crux."}, {"category": "Strategy & vision", "title": "\"What is strategy in one minute?\"", "q": "Define strategy vs goals vs roadmap.", "answer": "Strategy is the smallest set of coherent choices that address the hardest barrier to winning. Goals are aspirations — what you want to achieve. Roadmaps are sequencing — the order in which you'll do things. The hierarchy matters: strategy comes first, goals are derived from it, roadmaps implement it. The most common failure is treating a list of goals as a strategy: \"grow 40%, improve NPS by 10 points, launch in two markets\" is not a strategy. A real strategy answers: what makes our challenge hard (diagnosis)? What's our approach to that hard thing (guiding policy)? What specific actions implement that approach without contradicting each other (coherent actions)?", "insight": "Strategy = diagnosis + guiding policy + coherent actions. Everything else is planning.", "story": "A team had \"10 strategic priorities.\" I asked everyone to stack-rank them — no two people agreed. That's proof there's no strategy, just a list. Two weeks to reach one diagnosis and one guiding policy. Planning the next quarter then took half a day."}, {"category": "Strategy & vision", "title": "\"Where to play / how to win\"", "q": "We're considering three markets. How do you choose?", "answer": "I'd apply the \"big fish, small pond\" filter: which segment can we credibly own 30–50% of within 24 months? Not the biggest market — the one we can dominate. Then I'd check: which segment gives us the best combination of capabilities we already have and reference customers who, once won, make the next customers easier? And I'd explicitly name the excluded segments, because the decision not to serve someone is as important as who you do serve. Trying to win all three markets simultaneously is usually worse than dominating one — concentration beats spread every time in early-stage.", "insight": "Concentration beats spread. Pick the segment you can win at 30–50% share, not the biggest TAM.", "story": "We debated SMB, mid-market, and enterprise. A simple model on time-to-revenue, sales cycle, NRR, and churn by segment showed mid-market had the best economics and we had two reference customers. We went all-in — hit 40% category share in 18 months, then moved up-market from a position of strength."}, {"category": "Strategy & vision", "title": "\"Competitive response\"", "q": "A competitor copied our core feature.", "answer": "If a copy hurt us, we didn't have a real barrier — we had a feature. My first question is: what made us valuable before, and why doesn't that still hold? If the answer is \"the feature itself,\" we need to build actual power: data that gets more valuable with use, switching costs through integrations, workflow lock-in, or an ecosystem where our platform is the foundation. My second question is: is this a moment to invest in hard-to-copy advantages, or to reframe the narrative? A competitor copying your feature often lets you make the category argument — \"they're trying to be us, which means this approach won; now let's show why we do it better.\"", "insight": "A copy means you lacked a barrier. Respond by investing in what compounds — data, switching costs, ecosystem — not feature parity.", "story": "When a well-funded competitor cloned our core reporting feature, we doubled down on our data integration layer instead of racing on features. Within a quarter, customers were saying \"we can't leave because all our data is connected.\" That's switching cost. We stopped competing on features and started winning on stickiness."}, {"category": "Strategy & vision", "title": "\"Vision vs execution\"", "q": "Founders want a 10-year vision; teams want clarity this month.", "answer": "These operate at different time horizons and both are legitimate. Vision answers \"what world are we building?\" — stable enough that the team can make daily decisions pointing in the right direction. Strategy answers \"what's our next hill?\" — changing as we learn. Roadmaps answer \"how do we take that hill without lying about dependencies?\" When founders want 10-year vision and teams want monthly priorities, I give both: a one-page vision narrative, plus quarterly thematic goals that show how this quarter's work connects to the vision. The mistake is either a 10-year roadmap (false certainty) or no vision at all (random walk).", "insight": "Vision = constraints & taste (stable). Strategy = next hill (annual). Roadmap = sequencing (quarterly). Don't conflate layers.", "story": "A founder kept changing quarterly priorities because the team couldn't connect daily work to the vision. I wrote a one-page \"world we're building\" doc and ran monthly demos showing progress toward it. The founder stopped changing priorities — he could see the connection — and the team had clarity on why their work mattered."}, {"category": "Strategy & vision", "title": "\"Platform strategy\"", "q": "When do you build a platform vs point solutions?", "answer": "Platformize when the same primitive gets rebuilt three times by different teams — not before. Premature platformization creates expensive generality for one use case. The signal is internal: are multiple product teams blocked waiting for the same capability? Are customers asking for API access at scale? Is developer-time-saved a natural north star for this work? I also ask the strategic question: does this platform create switching costs and ecosystem lock-in, or is it just shared code? A platform that becomes the foundation for partner integrations is a moat. One that's just an internal library probably didn't need to be called a platform.", "insight": "Platformize at the third use case. Check it creates switching costs or ecosystem — not just shared code.", "story": "We built a \"platform\" after the first internal use case. Six months of generic infrastructure that nobody used generically. When we finally had three real use cases, we refactored into the right platform in 6 weeks — and it was correct because we understood the actual requirements by then."}, {"category": "Strategy & vision", "title": "\"Pricing / packaging\"", "q": "How does strategy connect to pricing?", "answer": "Pricing is not the last decision you make before launch — it's a strategy choice that signals who you're building for and how you create value. The key is finding the value metric: the thing that scales with customer value. Seat-based pricing says \"we're a collaboration tool.\" Usage-based says \"we're infrastructure.\" Outcome-based says \"we're accountable for results.\" I'd start by asking: what does the customer get more of when they get more value from us? Price that. Use packaging (good/better/best) to segment willingness-to-pay across customer sizes, and test packaging changes before headline price changes — packaging is lower-stakes to experiment with.", "insight": "Find the value metric (what scales with customer value), price that. Test packaging before touching headline price.", "story": "We were priced per seat and hitting a wall in enterprise — large teams balked at seat count. We ran a packaging experiment: unlimited seats + usage-based pricing on the output metric. Enterprise ARR grew 80% in two quarters because our revenue model aligned with the value customers were actually getting."}, {"category": "Growth", "title": "\"Growth is slowing—hire growth?\"", "q": "Growth slowed; should we hire a growth team?", "answer": "A growth team amplifies product-market fit — it can't create it. If growth is slowing because the core product doesn't deliver enough value to generate word-of-mouth and retention, a growth team will just optimize acquisition of churn. The first test: look at cohort retention. If retention is weak for users who do experience the core value, that's a product problem. If retention is strong but activation is weak, growth can help. The sequence should be: prove retention → fix activation → then grow acquisition. Don't hire growth before you've solved retention.", "insight": "Growth amplifies PMF; it doesn't fix it. Sequence: Retention → Activation → Acquisition.", "story": "A growth team was proposed when user growth flattened. I pulled 6-month retention cohorts instead. Users who ran their first automated workflow had 85% 6-month retention. Users who didn't had 10%. The problem wasn't growth — only 15% of signups ever reached the aha moment. We fixed onboarding, and growth followed without a growth hire."}, {"category": "Growth", "title": "\"Build a growth model\"", "q": "How do you model growth for a B2B SaaS product?", "answer": "I'd start by drawing the loops, not the funnel. Funnels show how users move through steps; loops show the mechanisms by which existing users generate new users or revenue. For B2B SaaS, typical loops are: product-led (users share or invite within org), sales-assisted (product-qualified leads trigger outreach), and content/community (brand generates inbound). Then I find the bottleneck — which loop stage has the worst conversion or highest leverage? I only pick tactics once I know the bottleneck, because a tactic that works on acquisition when the bottleneck is activation is wasted. I revisit the bottleneck quarterly because it moves as you scale.", "insight": "Draw the loops, find the bottleneck, then pick tactics. Tactics without bottleneck diagnosis are spray-and-pray.", "story": "We were pouring money into paid acquisition while the real bottleneck was workspace collaboration — users signed up but never invited a teammate. Once we fixed the invite flow, our viral coefficient went from 0.1 to 0.4, and we achieved the same growth for 60% of the ad spend."}, {"category": "Growth", "title": "\"PLG vs sales\"", "q": "Should we be PLG or sales-led?", "answer": "The modern answer is almost always hybrid — the question is which motion handles which job. PLG works for activation and expansion within accounts where users can self-serve to value. Sales works for procurement complexity, security reviews, enterprise contracts, and situations where the economic buyer and the user aren't the same person. Use self-serve for SMB to build proof of concept without sales cost, then use sales to expand enterprise accounts once product has demonstrated value. The mistake is applying one motion universally — both PLG-only and sales-only have significant gaps in most B2B businesses.", "insight": "PLG for activation/expansion, sales for procurement complexity and economic buyer separation. Rarely either/or.", "story": "We went PLG-first and hit a wall at mid-market because no one owned the procurement conversation. We added a thin \"sales assist\" layer triggered by product-qualified signals — users who'd invited 5+ teammates or connected their data source. That layer closed 60% of our $50K+ deals without touching SMB self-serve at all."}, {"category": "Growth", "title": "\"Referral program\"", "q": "Should we add referrals?", "answer": "Referrals are a loop, not a banner. They work when there's a natural moment of delight where users want to share, the value to the recipient is clear and immediate, and the incentive is plausible rather than performative. Before building a referral program, I'd ask: do users naturally recommend us without incentives? If yes, referrals can amplify that. If no, a referral banner won't fix it. I'd instrument referral quality (retention of referred users) not just volume, because a program generating low-quality users is worse than no program — it gums up support and distorts your metrics.", "insight": "Referrals amplify organic sharing; they don't create it. Measure recipient quality before sender volume.", "story": "We launched referrals with a discount and got 3× the signups — but referred users had 40% lower 90-day retention. The referrers were gaming the discount, not genuinely recommending. We switched to \"invite a teammate\" with a feature unlock (not a discount). Referred-user retention matched organic with 30% of the volume."}, {"category": "Growth", "title": "\"International expansion\"", "q": "How do you approach international growth?", "answer": "I treat international expansion as a new beachhead, not a translation project. The assumption that US product-market fit transfers internationally is almost always wrong in at least one dimension — payment methods, regulatory requirements, trust dynamics, or competitive landscape. My approach: pick one country, prove retention parity with your home market before scaling spend, and find 10 local power users who'll give honest feedback. The most common mistake is spending on international acquisition before proving that international users stay — you end up optimizing a leaky bucket.", "insight": "International = new beachhead. Prove retention parity before spend. Don't assume PMF transfers.", "story": "We launched in Germany by translating the app. Growth was flat. Interviews revealed German users needed GDPR data residency guarantees before committing — nothing to do with language. We added EU data residency and retention went from 30% to 72% in 90 days. Then we spent on marketing."}, {"category": "Growth", "title": "\"Viral loop design\"", "q": "What makes a viral loop actually work?", "answer": "K-factor math is necessary but not sufficient — a loop can have great math and fail if the invite feels spammy or the recipient gets no value on arrival. The three factors that actually predict whether a loop works: recipient value in the first session (do they immediately get something?), contextual fit (does the invitation make sense at that moment?), and inviter motivation (do they genuinely want to share, or are they just responding to a prompt?). I optimize recipient experience first — if referred users activate well, I know the loop has real signal. Then I work backward to inviter motivation.", "insight": "Optimize recipient value first, inviter incentives second. A loop that feels spammy dies regardless of K-factor.", "story": "Our social sharing button had a 2% click rate and near-zero downstream activation. We changed from \"share this\" to \"invite a collaborator to this specific project\" — contextual, tied to real workflow. Click rate went to 8% and referred-user activation tripled, because recipients arrived with a reason to be there."}, {"category": "Metrics & success definition", "title": "\"Define success for a new feature\"", "q": "How do you define success before shipping?", "answer": "I define one primary customer outcome metric, 2–3 input metrics I control that should drive it, and explicit guardrails for what I don't want to break. I write these before shipping, not after — post-hoc metric selection is one of the most common ways teams convince themselves something worked when it didn't. Composite \"engagement\" metrics are almost always wrong because they can be gamed in a dozen ways. I want a metric that, if it goes up, I am confident the world is genuinely better for customers. I also distinguish between experiment metrics (what I'll measure in an A/B test) and ongoing metrics (what I track in production).", "insight": "One primary outcome metric + input drivers + guardrails. Write them down before shipping, not after.", "story": "Our team defined feature success as \"adoption rate\" — which went up immediately because we'd put it in a prominent place. But we hadn't pre-registered retention of adopters as a guardrail. Post-hoc analysis showed adopters churned 15% faster. The feature looked successful by its own metric while actively hurting the business."}, {"category": "Metrics & success definition", "title": "\"North Star metric\"", "q": "What's a good North Star?", "answer": "A North Star should track value delivered to customers, not internal activity. Revenue is a consequence of value, not a measure of it — and when you optimize revenue directly, you can destroy the value that generates it long-term. My test: if this metric went up 20% while customers became significantly less happy, would we still celebrate? If yes, it's the wrong metric. A good North Star is usually frequency-linked (because regular use indicates genuine value), reflects a customer behavior that's meaningful rather than just a click, and serves as a north star for the whole company — product, sales, and support all know what they're optimizing toward.", "insight": "North Star tracks delivered customer value, not internal activity. Revenue is a consequence, not the star.", "story": "We had \"monthly active users\" as our North Star. Engagement went up every time we sent more notifications. We replaced it with \"workflows completed per active user\" — our notification strategy completely changed, retention improved 18%, and notification volume dropped 60%."}, {"category": "Metrics & success definition", "title": "\"Experiment says neutral\"", "q": "Your A/B test is flat. What now?", "answer": "A flat result is useful information — the question is what it's telling me. I run three diagnoses: was the test underpowered (not enough users or time to detect a real effect)? Was it measuring the wrong metric (the change affected one segment but we measured averages)? Or is the answer genuinely null — the change doesn't matter? For diagnosis I segment: new vs power users, different cohorts, different use cases. Flat overall often hides meaningful positive in one segment and negative in another. If it's genuinely null, that's a signal to try a step-function change, not a tweak — you're at a local maximum.", "insight": "Flat = underpowered, wrong metric, or wrong segment. Always segment before concluding null.", "story": "A flat A/B test on our onboarding flow confused me until I segmented by user type. New users improved 15%, returning users degraded 10%, net: flat. We shipped the change for new users only, blocked it for returning users, and got the win."}, {"category": "Metrics & success definition", "title": "\"Goodhart / metric gaming\"", "q": "Teams are gaming the metric. What do you do?", "answer": "Any single number will be gamed — this is Goodhart's Law, and it's not a moral failing, it's a rational response to incentives. The solution is a small bundle of metrics that are hard to game simultaneously: a primary (what we care about), a quality proxy (to catch gaming the primary), and a fail-state metric (what we don't want to break). I'd also add distributional checks: not just \"average NPS is 8\" but \"what fraction of users gave us a 1–3 and why?\" Gaming often shows up in distributions before averages. Finally, I rotate who reviews metrics so no single team both owns the metric and conducts the review.", "insight": "A metric bundle (primary + quality proxy + fail-state) is harder to game than any single number.", "story": "Our support team was resolving tickets immediately after replying, regardless of customer satisfaction. Adding \"re-open rate\" as a pairing metric made that strategy self-defeating. Resolved count stayed high, re-open rate dropped, and actual resolution quality improved — because both metrics had to move together."}, {"category": "Metrics & success definition", "title": "\"Leading vs lagging\"", "q": "Board wants revenue; team needs actionable goals.", "answer": "Revenue is a lagging indicator — by the time it tells you something is wrong, it's usually too late to fix it this quarter. The answer is to translate revenue into the input metrics that cause it: pipeline health, conversion rate by funnel stage, average contract value, time to close, and expansion revenue from existing customers. These are things the team can influence week-to-week. I'd commit the org to 2–3 input metrics with clear causal hypotheses (\"if we improve trial-to-paid conversion by 5%, we expect $X in additional ARR\") so the board can see the theory of the business, not just the scoreboard.", "insight": "Revenue = scoreboard. Lead with customer inputs that historically move it. Give the team what they can control.", "story": "When revenue growth was flat, I built a driver model showing 70% of the gap came from one stage: trial-to-paid conversion. We focused the whole team on that number for a quarter. It went from 18% to 27%, and revenue growth followed next quarter. The board stopped watching revenue and started tracking conversion with us."}, {"category": "Metrics & success definition", "title": "\"AI / engagement metrics\"", "q": "How do you measure an AI feature?", "answer": "AI features require probabilistic measurement because there's no single right answer to compare against. I combine three signal types: offline evals (golden test sets for known good/bad scenarios), production signals (implicit feedback like edit distance on AI drafts, re-generation rate, session abandonment after AI interaction), and human review on a sample of high-stakes interactions. I design metrics around task success rate per scenario — not \"did the AI respond?\" but \"did the user accomplish their goal with less effort?\" The most common mistake is relying on thumbs-up/thumbs-down ratings, which are biased toward users who bother to rate and miss the silent majority who just stopped using the feature.", "insight": "Task success rate + implicit signals (edit distance, re-gen rate) + human sampling beats any single engagement metric.", "story": "We launched an AI writing assistant and measured \"messages generated\" — looked great. Edit distance analysis showed users were editing 80% of the output before sending, suggesting the AI wasn't saving time. We pivoted to \"drafts sent with minor or no edits\" as our primary metric, which led us to completely retrain the model on our users' actual writing style."}, {"category": "Execution & working with eng/design", "title": "\"PM vs eng conflict\"", "q": "Engineering says your spec is wrong / infeasible.", "answer": "If engineering is pushing back on my spec, I probably failed to involve them early enough — that's on me, not them. The right response is to reset to the problem, not defend the solution: \"here's the customer outcome we're trying to achieve; what do you think is the fastest path?\" Engineers often have better solutions than PMs when they understand the actual constraint. I treat pushback as a discovery signal. If there's genuine disagreement about the problem itself, I propose a time-boxed spike to surface evidence. The worst response is arguing the spec — you lose the team even if you win the argument.", "insight": "Spec pushback = I failed to involve them in the problem. Reset to outcome, not solution.", "story": "An engineer told me a feature would take 3 months. I asked what made it hard — she explained a data model issue I hadn't considered. Together we scoped an alternative that solved 80% of the customer problem in 2 weeks and deferred the hard part. The customer was happier than they would have been with my original spec."}, {"category": "Execution & working with eng/design", "title": "\"Working with design\"", "q": "How do you partner with design well?", "answer": "The worst PM-design dynamic is design-as-a-service: PM writes requirements, throws them over the wall, design makes it look good. The best dynamic is shared ownership of usability and customer evidence — designers in user research with me from the start, not receiving a summary of it. We pair on prototypes before any PRD is written. Design crits have a named decision-maker so feedback is actionable, not a debate. I think of the designer as co-owner of the customer outcome, and the work is dramatically better when that's actually true rather than just stated.", "insight": "Design as co-owner of usability risk, not a service layer. Pair on customer evidence, not on deliverables.", "story": "I used to write detailed PRDs before involving design. Every handoff resulted in redesigns that changed scope and slipped timelines. I switched to 30-minute \"customer problem\" kickoffs with design before writing anything. Designs came back better and required fewer revisions. Timelines got shorter because we found the hard constraints earlier."}, {"category": "Execution & working with eng/design", "title": "\"Estimates always slip\"", "q": "Deadlines slip every sprint.", "answer": "Chronic slipping is almost always a symptom, not the root cause. The three real causes: hidden dependencies (something is blocked on another team but nobody named the dependency), discovery debt (finding out during implementation what we should have learned upfront), and WIP overload (the team has too many simultaneous projects to complete any of them cleanly). The fix isn't better estimation — estimates are inherently inaccurate for complex work. The fix is smaller batches so surprises are caught earlier, explicit dependency maps, and protected discovery time before implementation starts.", "insight": "Chronic slips = hidden dependencies, discovery debt, or WIP overload. Don't estimate better — batch smaller.", "story": "A team consistently slipped every sprint. When I mapped their work, they had 7 simultaneous projects across 4 people. We cut to 2 projects in parallel — sprint completion rate went from 50% to 85% within a month. The work didn't change, the parallelism did."}, {"category": "Execution & working with eng/design", "title": "\"Bugs in launch week\"", "q": "Launch is next week; bug backlog is huge.", "answer": "Every launch decision is a risk decision, not a quality decision. I'd triage by severity × reach: worst case for each bug, and how many users hit it? S0 (data loss, security, complete blocking) = delay or feature-flag it out. S1 (significant degradation for a subset) = fix or scope out. S2+ = document, prioritize post-launch, set a monitoring alert. I make the risk explicit to stakeholders — \"here's what we know, here's what we're monitoring, here's our rollback plan\" — rather than pretending everything is green or delaying indefinitely. A dark launch or feature-flagged rollout gives production monitoring without full blast radius.", "insight": "Triage by severity × reach. Make risk explicit with a rollback plan — don't binary ship/no-ship.", "story": "In a launch week with 40 open bugs, I ran a severity triage in 2 hours. We found 3 S0s, fixed them in 24 hours, flagged 8 S1s for Day 1, and shipped. None of the S1s caused a critical incident and we cleared them within 3 days. The launch would have delayed 2 weeks if we'd waited for the full backlog."}, {"category": "Execution & working with eng/design", "title": "\"Agile / Scrum frustrations\"", "q": "Scrum feels bureaucratic.", "answer": "Scrum is a delivery skeleton — it tells you when to synchronize and reflect, not what to do or why. When it feels bureaucratic, the ceremonies have become disconnected from actual learning. I'd ask: what decision does each ceremony enable? If the retrospective doesn't change how the team works, it's theater. If sprint planning is just redistributing tasks, it's overhead. I keep the ceremonies that reduce learning latency — short feedback loops, regular reflection — and drop the ones that don't. Discovery work belongs outside the sprint cadence because it has different rhythms than delivery.", "insight": "Keep ceremonies that reduce learning latency. Drop anything that doesn't change behavior.", "story": "Our team had 6 hours of Scrum ceremonies per week and shipped slower each quarter. I audited: daily standup had become status theater (dropped it), sprint planning was 4 hours of ticket-moving (replaced with 1-hour outcome planning), retros had no action items (added one required experiment per retro). Ceremony time dropped to 2 hours and we had our first \"clean\" sprint in 6 months."}, {"category": "Execution & working with eng/design", "title": "\"Remote / async collaboration\"", "q": "How do you run product in a remote org?", "answer": "Remote rewards written clarity and explicit ownership above everything else. The artifacts I invest most in: decision logs (what was decided, who decided it, why, what was rejected), async PRDs with video walkthroughs instead of spec-review meetings, and a single source of truth for current priorities with timestamps. Synchronous time is reserved for high-bandwidth, high-ambiguity conversations — direction alignment, conflict resolution, creative exploration. The antipattern is using sync meetings to share information that could be a document, which leaves remote team members who missed the meeting perpetually behind.", "insight": "Write decisions (not just conclusions). Async for information sharing; synchronous only for high-ambiguity alignment.", "story": "After going fully remote, we had 25 hours of meetings per person per week. I introduced a rule: every meeting must have a written pre-read and a written decision record. Meeting count dropped 40% because people stopped scheduling meetings to share status — and the remaining meetings were higher quality because everyone arrived informed."}, {"category": "Leadership without authority / influence", "title": "\"No authority—how do you lead?\"", "q": "How do you influence without being the boss?", "answer": "Influence comes from three things: the quality of your evidence, the reliability of your follow-through, and the transparency of your reasoning. People follow PMs who are demonstrably right more often than wrong, who do what they say they'll do, and whose decision-making rationale is predictable. I bring customer clips to debates instead of opinions. I document decisions and share them widely so people can see how I think. I pre-brief stakeholders before forums so they're not surprised. The fastest way to lose influence is to be right on the outcome but wrong on the process — showing up to meetings with foregone conclusions instead of shared reasoning.", "insight": "Influence = quality of evidence + reliability of follow-through + transparent reasoning. Not title.", "story": "I needed a partner engineering team to change their prioritization and had no authority over them. Instead of escalating, I brought them into a customer call where our mutual problem was obvious. They reprioritized the next week — not because I pushed, but because they now cared about the same problem I did."}, {"category": "Leadership without authority / influence", "title": "\"Disagree with your manager\"", "q": "You disagree with your manager on direction.", "answer": "I write a one-pager with options, my recommendation, the key assumptions that would need to be true for each, and the cheapest test I'd propose. I share it as a thinking tool, not a persuasion device — I'm asking for their reasoning, not demanding their agreement. If they disagree, I ask: \"What would need to be true for my recommendation to be right?\" That surfaces the core disagreement, which is usually an assumption difference, not a values difference. If they still disagree after I've genuinely heard their reasoning, I commit to their direction, set a review checkpoint, and don't passive-resist. Disagree-and-commit beats passive resistance every time.", "insight": "Frame disagreement as an assumption difference. Propose a test. Commit once the decision is made.", "story": "My manager wanted to push a feature I thought was premature. I proposed a 3-week fake-door test to measure demand before building. She approved the test. Demand was lower than either of us expected. We deprioritized the feature with data — which preserved the relationship and the team's trust in both of us."}, {"category": "Leadership without authority / influence", "title": "\"Cross-functional politics\"", "q": "Another team is blocking you politically.", "answer": "Political blocking is almost always incentive misalignment in disguise. I map what the other team is optimizing for, what they're afraid of, and what a shared win looks like. Most blocks dissolve when you find the version of your goal that also advances their goal — a shared metric, a resource trade, a design that removes their concern. If there's a genuine resource conflict, I bring it to the appropriate executive as a clean prioritization decision with options — not as a political complaint. The goal is to make the decision clear, not to win the argument.", "insight": "Blocks = incentive misalignment. Find the shared win first, or surface the trade-off cleanly at the right level.", "story": "A data engineering team was deprioritizing my requests for 6 weeks. I learned their lead was worried my work would break their data quality SLAs. I added a data quality checkpoint to my spec and brought it to them directly. They moved my request to the top of their queue the next week — the block was a concern, not a conflict."}, {"category": "Leadership without authority / influence", "title": "\"Crisis / incident\"", "q": "Major outage—what's your role as PM?", "answer": "In an incident, my job is to own narrative and customer impact so engineering can own the mitigation. Three immediate actions: get customer-facing communication out as fast as possible (even if it's just \"we know, we're working on it\"), identify and reach out to top accounts who are affected, and give engineering a single point of contact so they're not managing Slack questions while debugging. I don't speculate on cause or timeline — I set a cadence for updates (every 30 minutes until resolved) and hold to it. After resolution, I own the postmortem narrative: what happened, what the customer impact was, and what we're changing.", "insight": "PM owns narrative and customer impact. Engineering owns mitigation. Never mix those roles during an incident.", "story": "During a 3-hour outage, I took all customer communication and stakeholder updates off the engineering team. They told me afterward they'd been spending 40% of their time in previous incidents answering Slack messages. That separation likely saved an hour of resolution time."}, {"category": "Leadership without authority / influence", "title": "\"Stakeholder says 'just ship it'\"", "q": "Legal/compliance is slow; business pressures ship.", "answer": "I make the risk binary and visible. I write a one-page risk acceptance doc: here's what we're shipping, here's the risk, here's the likelihood and impact if it materializes, here's the mitigation (feature flag, limited rollout, monitoring), here's who needs to sign off. This document does two things: it forces people who say \"just ship it\" to explicitly accept a risk rather than apply social pressure, and it creates a paper trail that protects the team if something goes wrong. Nine times out of ten, the risk acceptance process surfaces a creative scoping solution that wasn't obvious before.", "insight": "Make risk explicit with a signed acceptance doc. \"Just ship it\" without explicit risk acceptance is how teams get burned.", "story": "A sales leader wanted to ship before legal review. I offered three options: ship fully (legal risk, needs sign-off), ship to 10 beta customers (limited exposure, can pull it back), or wait 2 weeks for legal. They chose beta, signed off, and legal review came back with a minor wording change we shipped within the beta window. No incident, no delay."}, {"category": "Leadership without authority / influence", "title": "\"Motivate a tired team\"", "q": "Team is burned out after a crunch.", "answer": "First, I acknowledge what happened specifically, not generically — \"you shipped X under Y conditions and here's what it meant for customers\" is better than \"great work everyone.\" Then I protect recovery time: cancel low-value meetings, defer non-urgent roadmap reviews, push back on the next crunch request with data about velocity impact of sustained overwork. Motivation returns when people see progress on meaningful work, not when they're praised. I cut scope to give the team visible wins at a sustainable pace, and I add a retro specifically about what would have made the crunch unnecessary.", "insight": "Acknowledge specifically, protect recovery time, create visible wins at sustainable pace.", "story": "After a brutal launch, I cancelled two weeks of roadmap reviews and gave the team a \"tech health\" sprint to fix things that bothered them. Zero product metrics moved. But velocity the following quarter was 30% higher — the team had repaid their own debt and rebuilt trust that I'd protect them. The \"lost\" sprint paid back in 6 weeks."}, {"category": "Hiring & team building", "title": "\"What do you look for in PM hires?\"", "q": "What traits matter most when hiring PMs?", "answer": "I hire for judgment under ambiguity and evidence of cross-functional influence — everything else is trainable or level-dependent. Judgment shows up in how a candidate structures an ambiguous problem: do they start with the diagnosis or jump to solutions? Do they think about second-order effects? Evidence of influence shows up in references: can they name someone who changed their mind because of how this person framed a problem, not just because they were right? I'm also calibrating for level-appropriate aperture — a senior PM who can only operate inside a well-defined scope is a mid-PM regardless of title. I weight written case quality and reference depth over interview polish.", "insight": "Hire for judgment in ambiguity and evidence of cross-functional traction. Everything else is trainable.", "story": "The best PM hire I made bombed the design exercise — their solution was average. But every reference call included a story about an engineer or designer who said \"I changed how I work because of how she thinks.\" We hired her. She was our best PM within 6 months."}, {"category": "Hiring & team building", "title": "\"PM interview question you ask\"", "q": "What's your favorite interview question?", "answer": "\"Tell me about a significant product decision you were wrong about. What signal did you miss, and what did you change afterward?\" This tests three things at once: self-awareness (do they own it?), diagnostic thinking (can they identify the specific signal they missed, not just \"I should have listened more\"?), and learning behavior (did they actually change something or just say they did?). Candidates who can't answer this either haven't shipped enough or can't separate their ego from their decisions. The best answers are specific — \"I misread a qualitative signal because I was anchoring on quantitative data from a biased sample, so now I always validate qual with two cohorts.\"", "insight": "Ask about a wrong decision — it tests self-awareness, diagnosis quality, and actual behavior change simultaneously.", "story": "Best answer I ever got: a candidate described a feature that flopped, then traced back to research done with 8 early adopters who weren't representative of the actual user base. They described exactly how they changed their research process. That specificity told me everything about how they learn."}, {"category": "Hiring & team building", "title": "\"Underperforming PM\"", "q": "A PM on your team is struggling.", "answer": "I treat it as a product problem: diagnose before prescribing. First, I clarify whether the expectation was set clearly — sometimes PMs struggle because they're being held to a standard they didn't know existed. If the expectation was clear, I identify which specific competency is weak: customer insight, strategy, execution, or stakeholder management. Then I give behavioral feedback using SBI (Situation → Behavior → Impact), create a coaching plan with measurable behavior changes (not vague \"improve communication\"), and set a timeline. If there's no change after the coaching plan, I give explicit pre-firing clarity — being unclear there is a kindness that ultimately harms both of us.", "insight": "Diagnose which competency, give SBI behavioral feedback, set measurable milestones with a timeline.", "story": "A PM was struggling with stakeholder alignment. Through an SBI conversation she identified she was sharing conclusions without showing her reasoning — so stakeholders felt surprised rather than convinced. We practiced \"show the work\" in low-stakes meetings for 4 weeks. Her next cross-functional review landed without a single challenge."}, {"category": "Hiring & team building", "title": "\"Team structure\"", "q": "Pods vs platforms vs components—how do you choose?", "answer": "Team topology should mirror what you need to learn fastest — it's a strategy decision, not an org chart preference. If you need to move fast toward a customer outcome, give one team full ownership of the experience end-to-end. If you have shared capabilities multiple product teams depend on, a platform team reduces duplication. The failure mode is the wrong model: a component team that owns infrastructure but has no customer mandate becomes an internal service vendor responding to tickets instead of setting direction. My heuristic: if shipping something requires coordinating 3 teams, that's a signal one team should own it.", "insight": "Structure mirrors what you need to learn fastest. End-to-end ownership for outcomes; platforms for shared primitives.", "story": "Checkout was owned by three teams — payments, fraud, and UI. Every improvement required a three-team coordination meeting. We created a single checkout team. Time to ship checkout improvements dropped from 6 weeks to 2 weeks — the coordination overhead had been invisible until we removed it."}, {"category": "Hiring & team building", "title": "\"Diversity & hiring pipeline\"", "q": "How do you build a diverse PM pipeline?", "answer": "Diversity is a pipeline and evaluation system design problem, not a sourcing problem. The interventions that actually work: structured interviews with consistent questions and rubrics so evaluation is comparable across candidates; deliberate sourcing from APM programs, bootcamps, and adjacent roles; blind resume review to remove name and school bias at the top of funnel; balanced interview panels that reflect the diversity you're seeking. I track funnel conversion by demographic at each stage — losing candidates at the offer stage means compensation or culture issues; losing them at the screen means filter criteria.", "insight": "Fix top-of-funnel sourcing, evaluation rubrics, and panel balance. Measure funnel conversion by demographic stage.", "story": "Our PM funnel had diverse applicants at the top but not in final interviews. Tracking by stage revealed we were losing candidates at the take-home exercise — they couldn't dedicate 8 unpaid hours. We replaced it with a 45-minute paid exercise. Diversity in final rounds increased 40%."}, {"category": "Hiring & team building", "title": "\"Scaling PM org from 3 to 30\"", "q": "How does PM org design change as you scale?", "answer": "At 3 PMs, informal trust and direct communication scale easily. At 30, informal trust breaks down and you need explicit standards that don't require everyone to be in the same room. Investments in sequence: first, a shared understanding of what \"good\" looks like — PM principles with examples, not just a job ladder. Second, lightweight processes that preserve speed — team-level strategy docs, decision logs, shipping criteria. Third, communities of practice for specific domains so people learn from each other, not just from you. The trap is adding process for its own sake, which slows the people who were already working well.", "insight": "Scale replaces informal trust with explicit standards. Add the minimum process that preserves speed.", "story": "Going from 5 to 15 PMs, I added a \"PM principles\" doc and weekly office hours. New PMs ramped 2× faster because they had a decision framework, and I got 30% of my time back because PMs were making calls I used to make for them. The doc cost one week to write and paid back within a month."}, {"category": "Career & failure", "title": "\"Tell me about a failure\"", "q": "Describe a significant failure and what you learned.", "answer": "I'll share one where I misread a customer signal because I was overconfident in the data. We had strong quantitative evidence that a feature would drive activation — a correlation from cohort analysis that looked airtight. We shipped, activation didn't move, and post-hoc interviews revealed the correlation was driven by a confound: users who activated quickly were also the ones who'd received personal onboarding calls, not the feature. I'd attributed the activation to the feature when it was actually the high-touch model. What I changed: I now always ask \"what else changed for this cohort?\" before drawing causal conclusions from correlation.", "insight": "Own the failure specifically. Name the signal you missed, name what you changed — not \"I learned to listen more.\"", "story": "That is the story. The most important part is the specific behavior change at the end — \"I now always ask X\" — not the generic lesson."}, {"category": "Career & failure", "title": "\"Why leave your last job?\"", "q": "Why are you looking to move?", "answer": "I optimize for three things when I move: scope step-up (can I own a harder problem?), domain fit (is this something I'm genuinely curious about for years?), and team quality (will the people around me make me sharper?). I'm here because this role maps to one of those vectors in a way my current role doesn't — and I'm specific about which one. I don't trash previous employers: every company has constraints, and what looks like dysfunction from inside is usually a reasonable response to a hard problem. If I can't be specific about what I'm optimizing for, I probably don't understand my own career well enough.", "insight": "Optimize for scope, domain, or team quality. Be specific about which one. Vagueness signals lack of self-awareness.", "story": "This one must be personal. Pick one honest reason, be specific about what it unlocks, don't trash your previous company."}, {"category": "Career & failure", "title": "\"Career goals for 5 years\"", "q": "Where do you see yourself in five years?", "answer": "I'm building toward owning ambiguous problem spaces end-to-end — the kind where the solution space isn't defined and the success metric is still being invented. In five years I want to be setting product direction for a business unit, not executing a direction someone else defined. The skill I'm actively deepening right now is [be specific — e.g., quantitative product modeling, enterprise customer discovery, AI product development]. Title-only goals are hollow — I'm clearer on the type of problems I want to own and the impact I want to see than on the reporting level I want to hold.", "insight": "Answer with problem type and skill development, not title. Shows growth orientation and self-awareness.", "story": "This must be personal. The frame: \"problems I want to own\" + \"skill I'm building\" + \"why this role is the next step toward both.\""}, {"category": "Career & failure", "title": "\"Handling conflict with a peer\"", "q": "Tell me about conflict with a cross-functional peer.", "answer": "Most conflicts that looked interpersonal turned out to be goal misalignment — we were each optimizing for different outcomes and colliding on execution. My approach: name the shared goal first (\"we both want X for the customer\"), then surface where our constraints diverge (\"you need Y, I need Z\"). From there the conflict usually becomes a design problem. If there's genuine disagreement after that, I write a decision memo with my recommendation and theirs, and take it to the appropriate decision-maker — not to win, but to force explicit resolution rather than ongoing friction.", "insight": "Separate goal from method. Most conflicts are goal misalignment — solve by naming the shared goal first.", "story": "A months-long conflict with a sales leader who kept overriding product decisions with customer commitments. When I mapped our incentives, the problem was clear: her team was compensated on bookings, which created pressure to promise features. We proposed a lightweight \"commitment review\" where deals with product commitments needed product sign-off before close. The conflict stopped because the incentive structure changed."}, {"category": "Career & failure", "title": "\"Imposter syndrome / confidence\"", "q": "When have you doubted yourself?", "answer": "I've doubted myself most in rooms where I felt I didn't have the right credentials — engineers knew the technology better, designers had better taste, finance understood the numbers better. What I've learned is that my edge isn't knowing more than each of them — it's synthesizing across all of them and asking the question nobody's asking. The doubt was telling me to be humble, not to disengage. I channel it into preparation: I study the domain enough to be a good thought partner, I seek external validation through customer conversations, and I track small wins precisely so I have evidence to push back on the inner voice.", "insight": "Doubt signals humility, not incompetence. Channel it into preparation and external validation.", "story": "Before my first executive product review, I was convinced I didn't belong in the room. I over-prepared: three versions of the deck, a stakeholder pre-brief with every exec, a practice run with a mentor. The review went well — and I learned that over-preparation is how I convert doubt into confidence. That's not a bug, it's a system."}, {"category": "Career & failure", "title": "\"Work-life balance\"", "q": "How do you handle intensity?", "answer": "I treat sustainable pace as a performance strategy, not a virtue signal. Sustained overwork degrades decision quality — which is the thing I'm paid for. So protecting deep work and recovery time is about performing well, not avoiding hard work. In practice: I protect 2-hour blocks of uninterrupted thinking before meetings start. I say no to meetings without a clear decision or alignment need. I'm explicit with my team about when I'm unavailable and why, so they can model the same behavior without feeling like they're slacking. The constraint of finite energy is actually useful — it forces prioritization.", "insight": "Sustainable pace is a performance strategy. Protect deep work blocks and eliminate low-leverage meetings.", "story": "I was working 60-hour weeks and shipping less than when I worked 45. The problem was decision fatigue — by afternoon my judgment was reliably worse. I blocked my calendar before 11am for deep work, moved recurring meetings to afternoon, and output quality visibly improved. My best product insights happen in the first two hours of my day."}, {"category": "AI & the future of product", "title": "\"How is building AI products different?\"", "q": "What's different about AI-native product development?", "answer": "You're building probabilistic software — the user's experience isn't determined by a fixed spec path, it's determined by the interaction between user input and model behavior, which varies. This changes almost everything: you design for calibration rather than correctness, you build feedback loops before you build features, and you measure success with task success rates across scenario slices rather than binary pass/fail. The most important shift is how you handle failure: in traditional software, failure is a bug. In AI products, failure is a distribution — some percentage of interactions will be wrong, and your job is to manage which interactions fail, for whom, and how gracefully.", "insight": "AI = probabilistic software. Design for calibration (not correctness). Build feedback loops first, measure by scenario.", "story": "We launched an AI summarization feature and measured \"summaries generated\" — looked great. Trace review of a random sample showed 30% had hallucinated details. We added a human review gate for high-stakes scenarios, rebuilt our eval framework around factual accuracy by content type, and relaunched. Usage dropped 15% short-term; feature re-use rate (our proxy for trust) grew 40%."}, {"category": "AI & the future of product", "title": "\"PM job in 3 years with AI?\"", "q": "Will PMs exist / how does the role change?", "answer": "The execution parts of the PM role — writing tickets, running sprint ceremonies, synthesizing meeting notes — are already being automated or commoditized. What compounds is judgment, taste, and the ability to define and defend the right problem before anyone builds anything. PMs who think of themselves as process managers are at risk. PMs who think of themselves as decision-makers about what problems are worth solving, for whom, and why now — those skills get more valuable as AI takes execution off the table. The near-term practical shift: every PM will be expected to prototype faster, and the bar for \"is this worth building?\" gets answered with a working demo, not a spec.", "insight": "Execution commoditizes; judgment, taste, problem selection, and narrative compound.", "story": "I recently shipped a PM-generated prototype (using AI coding tools) that went through 3 rounds of customer feedback before engineering touched it. The team started implementation with validated design decisions already made. Engineering time on that project dropped 40% because discovery was done properly. That's the new PM leverage model."}, {"category": "AI & the future of product", "title": "\"Evals: necessary or overrated?\"", "q": "How do you think about evals for LLM features?", "answer": "Evals are one instrument in a feedback orchestra — necessary but insufficient alone. Offline evals (golden test sets) catch known failure modes and prevent regressions; essential for anything in production. But they miss novel failures and real-world distribution shifts. Production signals — re-generation rate, edit distance on drafts, session abandonment after AI interaction — catch the things evals don't. Human trace review on a sample of high-stakes interactions catches what neither evals nor automated signals catch. The failure mode is overindexing on offline evals because they're measurable and controllable, while real quality issues accumulate in production.", "insight": "Evals catch known failures. Pair with production signals (implicit) and human sampling for novel failures.", "story": "Our eval suite showed 92% accuracy on our golden test set. Users were still complaining. Trace review of 50 random production samples revealed a failure mode we hadn't tested: the model was confidently wrong on a class of inputs that looked like our test set but had a subtle domain difference. We added that class to evals and caught 3 more variants in the next two weeks."}, {"category": "AI & the future of product", "title": "\"AI for productivity—how you use it?\"", "q": "How do you personally use AI tools as a PM?", "answer": "I use AI to shorten iteration time on thinking, not to replace thinking. In practice: stress-testing my reasoning (\"here's my argument — what are the three strongest objections?\"), drafting and iterating on documents faster (I write the first rough draft, AI improves structure, I revise), and SQL and data exploration with verification (I always check the output before trusting it). I'm disciplined about what I don't delegate: customer truth (talking to users), final judgment on trade-offs, and any output that creates a commitment without human review. The trap is using AI to feel productive without verifying the output — it has a strong bias toward confident-sounding wrong answers.", "insight": "AI shortens iteration time on thinking. Never delegate customer truth or final judgment without verification.", "story": "I used to spend 3 hours writing a strategy memo. Now: 1 hour writing the rough argument, AI improves structure and surfaces gaps, 1 hour revising. The output is better and takes 2 hours total. The key: I'm still thinking. The AI makes my iteration loop faster, it doesn't replace the loop."}, {"category": "AI & the future of product", "title": "\"Responsible AI / risk\"", "q": "What risks worry you most with AI features?", "answer": "The risks I watch most carefully: wrong actions at scale (an AI agent that misinterprets an instruction can cause irreversible damage across thousands of interactions before it's caught), privacy (user data flowing through model APIs in ways users don't understand), and trust erosion (a model that's confidently wrong in ways users can't detect destroys trust faster than one that's obviously uncertain). I match guardrails to the action space: higher autonomy requires more conservative defaults. Suggest mode before draft mode before act mode. Every high-autonomy action gets a human approval gate until calibration data shows the error rate is acceptable.", "insight": "Risk scales with autonomy. Match guardrails to action space. Suggest → draft → act, in stages.", "story": "We shipped an AI that could take actions in a user's project — create tasks, assign team members, set deadlines. Early testing showed 3% error rate on action interpretation. We kept it in \"suggest\" mode (show the action, require one click to confirm) until we had 10,000 confirmed actions with under 0.5% error. Zero incidents at launch. We moved to auto-act for low-risk actions three months later."}, {"category": "AI & the future of product", "title": "\"Org adoption of AI\"", "q": "How would you help a company adopt AI responsibly?", "answer": "The failure modes in AI adoption are fear and magical thinking — both make responsible adoption impossible. My approach: start with narrow, measurable pilots tied to existing workflows (not greenfield \"AI transformation\" projects), give leaders hands-on access before rolling anything out broadly (you need informed advocates, not credulous ones), and create psychological safety for subject matter experts to say when AI output is wrong — because the risk of an SME silently accepting a bad AI output is real. I measure adoption by workflow improvement, not usage — did this save time and improve quality, or did it just add a step?", "insight": "Narrow pilots tied to real workflows, informed leaders, and psychological safety to reject bad AI outputs.", "story": "We rolled out an AI writing assistant to our support team. Adoption was 80% but quality scores dropped. Interviews revealed agents felt pressure to use AI output even when it was wrong because they thought management wanted AI use. We added explicit permission to reject AI suggestions without explanation — quality scores recovered within two weeks. The problem was culture, not the tool."}];

    const catSel = document.getElementById("cat");
    const flipCard = document.getElementById("flipCard");
    const front = document.getElementById("front");
    const back = document.getElementById("back");
    const progress = document.getElementById("progress");

    let active = [...CARDS];
    let idx = 0;

    function categories() {
      const s = new Set();
      CARDS.forEach((c) => s.add(c.category));
      return [...s].sort((a, b) => a.localeCompare(b));
    }

    function rebuildCategorySelect() {
      const cats = categories();
      catSel.innerHTML = '<option value="">All categories</option>';
      cats.forEach((c) => {
        const o = document.createElement("option");
        o.value = c;
        o.textContent = c;
        catSel.appendChild(o);
      });
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function fmtBold(s) {
      return escapeHtml(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    }

    function render() {
      if (!active.length) {
        front.innerHTML =
          '<span class="tag">Empty</span><p class="q">No cards match this filter.</p>';
        back.innerHTML = "";
        progress.textContent = "";
        flipCard.classList.remove("flipped");
        return;
      }
      if (idx >= active.length) idx = 0;
      if (idx < 0) idx = active.length - 1;
      const c = active[idx];
      flipCard.classList.remove("flipped");
      front.innerHTML =
        '<span class="tag">' +
        escapeHtml(c.category) +
        "</span>" +
        '<p class="card-title">' +
        escapeHtml(c.title) +
        "</p>" +
        '<p class="q">' +
        escapeHtml(c.q) +
        "</p>";
      back.innerHTML =
        "<h3>Answer</h3><div class='say-this'><p>" +
        fmtBold(c.answer) +
        "</p></div><h3>Key insight</h3><p>" +
        fmtBold(c.insight) +
        "</p><h3>Story to use</h3><p>" +
        fmtBold(c.story) +
        "</p>";
      progress.textContent = idx + 1 + " / " + active.length + " · " + c.category;
    }

    function applyFilter() {
      const v = catSel.value;
      active = v ? CARDS.filter((c) => c.category === v) : [...CARDS];
      idx = 0;
      render();
    }

    function shuffleDeck() {
      const v = catSel.value;
      const pool = v ? CARDS.filter((c) => c.category === v) : [...CARDS];
      active = pool.slice();
      for (let i = active.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = active[i];
        active[i] = active[j];
        active[j] = t;
      }
      idx = 0;
      render();
    }

    function go(delta) {
      if (!active.length) return;
      idx = (idx + delta + active.length) % active.length;
      flipCard.classList.remove("flipped");
      render();
    }

    function toggleFlip() {
      flipCard.classList.toggle("flipped");
    }

    document.getElementById("prev").addEventListener("click", () => go(-1));
    document.getElementById("next").addEventListener("click", () => go(1));
    document.getElementById("flipBtn").addEventListener("click", toggleFlip);
    flipCard.addEventListener("click", toggleFlip);
    flipCard.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        toggleFlip();
      }
    });

    document.getElementById("shuffle").addEventListener("click", shuffleDeck);
    document.getElementById("all").addEventListener("click", () => {
      catSel.value = "";
      active = [...CARDS];
      idx = 0;
      render();
    });

    catSel.addEventListener("change", applyFilter);

    document.addEventListener("keydown", (e) => {
      if (e.target && (e.target.tagName === "SELECT" || e.target.tagName === "INPUT")) return;
      if (e.key === "ArrowRight") {
        e.preventDefault();
        go(1);
      }
      if (e.key === "ArrowLeft") {
        e.preventDefault();
        go(-1);
      }
      if (e.key === " ") {
        e.preventDefault();
        toggleFlip();
      }
    });

    rebuildCategorySelect();
    active = [...CARDS];
    render();
  </script>
</body>
</html>
